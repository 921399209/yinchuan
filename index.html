<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>同款模板提示词生成器</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <aside class="left-panel">
          <div class="brand-row">
            <div>
              <p class="eyebrow">AI Creator Toolkit</p>
              <h1>同款提示词与 TikTok 文案</h1>
            </div>
            <span class="status-pill" id="apiStatus">等待配置</span>
          </div>

          <label class="drop-zone" id="dropZone" for="imageInput">
            <input id="imageInput" type="file" accept="image/*" />
            <span class="drop-icon">+</span>
            <strong>上传同款效果图</strong>
            <small>反推接近原始生图 prompt 的短提示词：自己的照片 + 提示词即可做同款</small>
          </label>

          <div class="preview-wrap" id="previewWrap">
            <img id="previewImage" alt="参考图预览" />
          </div>

          <div class="api-panel">
            <label id="apiKeyField">
              API Key
              <input id="apiKeyInput" type="password" placeholder="sk-..." autocomplete="off" />
            </label>
            <label>
              视觉模型
              <select id="modelInput">
                <option value="gpt-5.5">GPT-5.5</option>
              </select>
            </label>
            <button class="ghost-button wide-button" id="generateButton" type="button">生成同款模板</button>
            <button class="secondary-button wide-button" id="generateCopyButton" type="button">生成 TikTok 文案</button>
            <p class="hint" id="apiHint">固定使用 GPT-5.5，通过第三方视觉接口生成，不使用本地识别。</p>
          </div>
        </aside>

        <section class="right-panel">
          <div class="toolbar">
            <div>
              <p class="eyebrow">Reusable Template</p>
              <h2>原始风格同款 prompt</h2>
            </div>
            <button class="ghost-button" id="copyAllButton" type="button">复制全部</button>
          </div>

          <div class="controls">
            <label>
              文案语言
              <div class="checkbox-grid" id="copyLanguageInput">
                <label><input type="checkbox" name="copyLanguage" value="印尼语" checked /> 印尼语</label>
                <label><input type="checkbox" name="copyLanguage" value="泰语" /> 泰语</label>
                <label><input type="checkbox" name="copyLanguage" value="缅甸语" /> 缅甸语</label>
                <label><input type="checkbox" name="copyLanguage" value="马来语" /> 马来语</label>
                <label><input type="checkbox" name="copyLanguage" value="高棉语" /> 柬埔寨语言（高棉语）</label>
                <label><input type="checkbox" name="copyLanguage" value="乌尔都语" /> 巴基斯坦语言（乌尔都语）</label>
                <label><input type="checkbox" name="copyLanguage" value="阿拉伯语" /> 阿拉伯语</label>
                <label><input type="checkbox" name="copyLanguage" value="英语" /> 英语</label>
                <label><input type="checkbox" name="copyLanguage" value="俄语" /> 俄语</label>
                <label><input type="checkbox" name="copyLanguage" value="尼泊尔语" /> 尼泊尔语</label>
                <label><input type="checkbox" name="copyLanguage" value="孟加拉语" /> 孟加拉语</label>
                <label><input type="checkbox" name="copyLanguage" value="僧伽罗语" /> 斯里兰卡语（僧伽罗语）</label>
                <label><input type="checkbox" name="copyLanguage" value="印地语" /> 印地语</label>
                <label><input type="checkbox" name="copyLanguage" value="菲律宾语" /> 菲律宾语</label>
                <label><input type="checkbox" name="copyLanguage" value="法语" /> 法语</label>
                <label><input type="checkbox" name="copyLanguage" value="日语" /> 日语</label>
                <label><input type="checkbox" name="copyLanguage" value="韩语" /> 韩语</label>
                <label><input type="checkbox" name="copyLanguage" value="德语" /> 德语</label>
              </div>
              <small class="field-hint">直接勾选语言；选几种语言就生成几种语言版本。</small>
            </label>
            <label>
              文案类型
              <select id="copyTypeSelect">
                <option value="all">全部生成</option>
                <option value="hypic">Hypic 文案</option>
                <option value="capcut">CapCut 文案</option>
                <option value="capcut_reactivation">CapCut 拉失活文案</option>
              </select>
            </label>
            <label>
              你的照片主体
              <input id="subjectInput" type="text" placeholder="例如：图片中的男性、左边人物、我上传的人像照片" />
            </label>
            <label>
              输出用途
              <select id="goalSelect">
                <option value="用自己的照片生成同款图片">用自己的照片生成同款图片</option>
                <option value="保留本人脸部特征并生成同款场景">保留本人脸部特征并生成同款场景</option>
                <option value="生成适合 ChatGPT/Hypic 的同款模板">生成适合 ChatGPT/Hypic 的同款模板</option>
                <option value="提取参考图结构并替换为新主体">提取参考图结构并替换为新主体</option>
              </select>
            </label>
            <label>
              替换策略
              <select id="sceneSelect">
                <option value="只替换人物身份，保留场景、构图、动作和特效">只替换人物身份，保留场景、构图、动作和特效</option>
                <option value="替换人物和服装，保留场景结构和视觉冲击">替换人物和服装，保留场景结构和视觉冲击</option>
                <option value="替换产品主体，保留广告构图和光影">替换产品主体，保留广告构图和光影</option>
                <option value="替换主体，保留参考图的整体风格">替换主体，保留参考图的整体风格</option>
              </select>
            </label>
            <label>
              保留重点
              <select id="focusSelect">
                <option value="强还原构图、动作、场景、特效和电影感">强还原构图、动作、场景、特效和电影感</option>
                <option value="重点保留构图和主体姿态">重点保留构图和主体姿态</option>
                <option value="重点保留光影、色调和氛围">重点保留光影、色调和氛围</option>
                <option value="重点保留特效、材质和视觉冲击">重点保留特效、材质和视觉冲击</option>
              </select>
            </label>
          </div>

          <div class="output-grid prompt-output-grid">
            <section class="prompt-card">
              <div class="section-title">
                <span>ChatGPT 中文模板</span>
                <button class="text-button copy-one" data-copy="chatgptCn" type="button">复制</button>
              </div>
              <textarea id="chatgptCnOutput" spellcheck="false" placeholder="生成后，把自己的照片和这段提示词一起发给 ChatGPT"></textarea>
            </section>

            <section class="prompt-card">
              <div class="section-title">
                <span>ChatGPT English Template</span>
                <button class="text-button copy-one" data-copy="chatgptEn" type="button">复制</button>
              </div>
              <textarea id="chatgptEnOutput" spellcheck="false" placeholder="Use this with your own uploaded photo in ChatGPT"></textarea>
            </section>
          </div>

          <div class="section-title copy-section-title">
            <span>TikTok 文案分类</span>
            <button class="text-button" id="copyCaptionsButton" type="button">复制文案</button>
          </div>

          <div class="output-grid caption-output-grid">
            <section class="prompt-card">
              <div class="section-title">
                <span>Hypic 文案</span>
                <button class="text-button copy-one" data-copy="hypicCaption" type="button">复制</button>
              </div>
              <textarea id="hypicCaptionOutput" spellcheck="false" placeholder="必须包含 #hypic #hypiccreator #hypicATETHAT #Godpic"></textarea>
            </section>

            <section class="prompt-card">
              <div class="section-title">
                <span>CapCut 文案</span>
                <button class="text-button copy-one" data-copy="capcutCaption" type="button">复制</button>
              </div>
              <textarea id="capcutCaptionOutput" spellcheck="false" placeholder="必须包含 #capcut #capcutpioneer"></textarea>
            </section>

            <section class="prompt-card caption-wide-card">
              <div class="section-title">
                <span>CapCut 拉失活文案</span>
                <button class="text-button copy-one" data-copy="capcutReactivationCaption" type="button">复制</button>
              </div>
              <textarea id="capcutReactivationCaptionOutput" spellcheck="false" placeholder="必须包含 #capcut #capcutpioneer #capcutnow"></textarea>
            </section>
          </div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
